name: Mobile quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  js-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate

  ios-cng-simulator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx expo prebuild --clean --no-install
      - run: npx expo run:ios --configuration Debug --no-bundler
